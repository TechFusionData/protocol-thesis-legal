<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>PT Publisher — Authorization</title>
<style>
  body{background:#0d1116;color:#f0f0ee;font-family:Helvetica,Arial,sans-serif;line-height:1.6;max-width:760px;margin:0 auto;padding:48px 24px}
  h1{font-size:1.4rem;border-bottom:3px solid #6fb4d4;display:inline-block;padding-bottom:8px}
  code{background:#1a2129;padding:12px 16px;border-radius:8px;display:block;word-break:break-all;margin:16px 0;font-size:1.05rem}
  .muted{color:#9aa3ad;font-size:.9rem}
</style>
</head>
<body>
<h1>PT Publisher — TikTok authorization</h1>
<p id="status">Reading authorization response…</p>
<code id="code-box" hidden></code>
<p class="muted">Internal page for Protocol Thesis' own publishing tool. If you landed here by accident, there's nothing to do.</p>
<script>
  // Display the OAuth authorization code returned by TikTok so the operator
  // can hand it to the token-exchange step. Nothing is transmitted anywhere.
  const p = new URLSearchParams(location.search);
  const code = p.get("code"), err = p.get("error");
  const s = document.getElementById("status"), box = document.getElementById("code-box");
  if (code) {
    s.textContent = "Authorization successful. Copy this code into the PT Publisher token step:";
    box.textContent = code; box.hidden = false;
  } else if (err) {
    s.textContent = "Authorization failed: " + err + " — " + (p.get("error_description") || "no description");
  } else {
    s.textContent = "No authorization parameters present.";
  }
</script>
</body>
</html>
